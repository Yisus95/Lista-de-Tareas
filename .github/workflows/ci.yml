name: CI - minimal

on:
  push:
    branches: [ main, "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (from project)
        run: |
          python -m pip install --upgrade pip
          # Use the actual path that contains manage.py and requirements.txt
          pip install -r "Mi web/src/proyecto/requirements.txt"
          pip install pytest pytest-django

      - name: Verify Django installed
        run: |
          python -c "import django; print('Django', django.get_version())"

      - name: Run migrations
        working-directory: "Mi web/src/proyecto"
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        working-directory: "Mi web/src/proyecto"
        env:
          # keep this consistent with settings.py in that working dir
          DJANGO_SETTINGS_MODULE: proyecto.settings
        run: |
          pytest -q
        run: |
          pytest -q
